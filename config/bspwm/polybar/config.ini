[module/date]
	type = internal/date
	date = %a %d-%m-%Y
	label = ÔĀ≥ %date%
	format-foreground = #000000
	format-background = #A6E3A1
		[module/DATE_TO_TIME_ARROW]
		type=custom/text
		content = Óāį
		content-foreground = #A6E3A1
		content-background = #EA999C
		content-font = 3


[module/time]
	type = internal/date
	interval = 1.0
	time = %I:%M:%S
	label = ÔÄó %time%
	format-foreground = #000000
	format-background = #EA999C
		[module/TIME_TO_CPU_ARROW]
		type=custom/text
		content = Óāį
		content-foreground = #EA999C
		content-background = #A6E3A1
		content-font = 3

[module/cpu]
	type = internal/cpu
	label = Ôíľ %percentage%%
	interval = 0.5
	format-foreground = #000000
	format-background = #A6E3A1
		[module/CPU_TO_MEMORY_ARROW]
		type=custom/text
		content = Óāį
		content-foreground = #A6E3A1
		content-background = #EA999C
		content-font = 3


[module/memory]
	type = internal/memory
	interval = 0.5
	label = ÓŅÖ %percentage_used%%
	format-foreground = #000000
	format-background = #EA999C
		[module/MEMORY_TO_TITLE_ARROW]
		type=custom/text
		content = Óāį
		content-foreground = #EA999C
		content-background = #A6E3A1
		content-font = 3


[module/title]
	type = internal/xwindow
	label = %class% %title%
	label-empty = None
	label-maxlen = 20
	format-foreground = #000000
	format-background = #A6E3A1
		[module/TITLE_TO_BAR_ARROW]
		type=custom/text
		content = Óāį
		content-foreground = #A6E3A1
		content-background =
		content-font = 3

[module/ewmh]
type = internal/xworkspaces
label-active-background = #3f3f3f
label-occupied-underline = #555555

[module/tray]
	type = internal/tray
	format-margin = 8px
	tray-spacing = 8px
	tray-padding = 2px
	tray-size = 70%
	format-background = #EA999C
		[module/LAYOUT_TO_SYSYTAY_ARROW]
		type=custom/text
		content = Óā≤
		content-foreground = #A6E3A1
		content-background = #EA999C
		content-font = 3

[module/bspwm-layout]
	type = custom/script
	exec = /home/chris/.config/bspwm/scripts/bspwm-layout.sh
	interval = 1
	label = %output%
	format-foreground = #000000
	format-background = #A6E3A1
		[module/VOLUME_TO_LAYOUT_ARROW]
		type=custom/text
		content = Óā≤
		content-foreground = #EA999C
		content-background = #A6E3A1
		content-font = 3

